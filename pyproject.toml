[project]
name = "nextgen2026-coding-bootcamp"
version = "0.1.0"
description = "Session 1 workshop repo for a maintainable computational research workflow"
readme = "README.md"
authors = [
    { name = "Sam Cantrill", email = "sam.cantrill@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "matplotlib>=3.10.8",
    "pandas>=2.3.3",
]

[project.scripts]
hello = "nextgen2026_coding_bootcamp.hello:main"
viz = "nextgen2026_coding_bootcamp.viz:main"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
]
